name: Build ZIGZAG_FIBO APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-apk:
    name: Build Android APK (Gradle — tanpa expo.dev)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          # Tidak pakai cache: 'npm' — pnpm workspace, bukan npm

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ~/.pnpm-store
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-pnpm-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Android project (expo prebuild)
        working-directory: artifacts/zigzag-dashboard
        run: npx expo prebuild --platform android --no-install --clean
        env:
          EXPO_NO_TELEMETRY: 1

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('artifacts/zigzag-dashboard/android/**/*.gradle*') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Build debug APK
        working-directory: artifacts/zigzag-dashboard/android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon
        env:
          ANDROID_HOME: ${{ env.ANDROID_SDK_ROOT }}
          GRADLE_OPTS: -Dorg.gradle.jvmargs="-Xmx4g -XX:MaxMetaspaceSize=512m"

      - name: Rename & upload APK
        run: |
          mkdir -p output
          cp artifacts/zigzag-dashboard/android/app/build/outputs/apk/debug/app-debug.apk \
             output/zigzag-fibo-$(date +%Y%m%d-%H%M).apk
          ls -lh output/

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ZIGZAG_FIBO-APK
          path: output/*.apk
          retention-days: 30

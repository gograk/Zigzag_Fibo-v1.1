name: Build ZIGZAG_FIBO APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-apk:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('package-lock.json', 'package.json') }}
          restore-keys: ${{ runner.os }}-node-

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Accept Android SDK licenses & install build tools
        run: |
          yes | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager --licenses || true
          $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager \
            "platforms;android-35" \
            "build-tools;35.0.0" \
            "platform-tools"

      # Detect the best available NDK on this runner (prefer 27.x)
      - name: Detect available NDK
        run: |
          echo "NDK versions available on runner:"
          ls $ANDROID_SDK_ROOT/ndk/ 2>/dev/null || echo "none"
          NDK_DIR=$(ls -d $ANDROID_SDK_ROOT/ndk/27.* 2>/dev/null | sort -V | tail -1)
          if [ -z "$NDK_DIR" ]; then
            NDK_DIR=$(ls -d $ANDROID_SDK_ROOT/ndk/* 2>/dev/null | sort -V | tail -1)
          fi
          NDK_VER=$(basename "$NDK_DIR")
          echo "Using NDK: $NDK_VER  →  $NDK_DIR"
          echo "NDK_VERSION=$NDK_VER" >> $GITHUB_ENV
          echo "ANDROID_NDK_HOME=$NDK_DIR" >> $GITHUB_ENV

      - name: Generate Android project (expo prebuild)
        run: npx expo prebuild --platform android --clean
        env:
          EXPO_NO_TELEMETRY: 1

      # ExpoRootProjectPlugin hardcodes ndkVersion "27.1.12297006" via rootProject.ext.
      # If that exact NDK isn't installed the build fails in ~23s at configuration phase.
      # Patch the generated file to use the NDK that is actually present on this runner.
      - name: Patch NDK version in generated build.gradle
        run: |
          echo "Patching ndkVersion to: $NDK_VERSION"
          sed -i "s/ndkVersion rootProject\.ext\.ndkVersion/ndkVersion \"$NDK_VERSION\"/" android/app/build.gradle
          echo "Result:"
          grep "ndkVersion" android/app/build.gradle

      - name: Increase Gradle JVM heap
        run: |
          echo "org.gradle.jvmargs=-Xmx4g -XX:MaxMetaspaceSize=512m -XX:+HeapDumpOnOutOfMemoryError" >> android/gradle.properties

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('android/**/*.gradle*', 'android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Build debug APK
        working-directory: android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon --stacktrace
        env:
          ANDROID_HOME: ${{ env.ANDROID_SDK_ROOT }}
          ANDROID_NDK_HOME: ${{ env.ANDROID_NDK_HOME }}
          JAVA_HOME: ${{ env.JAVA_HOME }}

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ZIGZAG_FIBO-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
          retention-days: 30

name: Build ZIGZAG_FIBO APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-apk:
    name: Build Android APK (Gradle — tanpa expo.dev)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('package.json') }}
          restore-keys: ${{ runner.os }}-node-

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      # Prebuild tanpa --no-install agar expo bisa setup native dependencies-nya sendiri
      - name: Generate Android project (expo prebuild)
        run: npx expo prebuild --platform android --clean
        env:
          EXPO_NO_TELEMETRY: 1

      - name: Accept Android SDK licenses
        run: |
          yes | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager --licenses || true
          $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager \
            "platforms;android-35" \
            "build-tools;35.0.0" \
            "platform-tools"

      - name: Patch NDK version
        run: |
          NDK_VER=$(ls $ANDROID_SDK_ROOT/ndk 2>/dev/null | sort -V | tail -1)
          echo "NDK tersedia: $NDK_VER"
          if [ -n "$NDK_VER" ]; then
            sed -i "s/ndkVersion = \".*\"/ndkVersion = \"$NDK_VER\"/" android/app/build.gradle || true
            sed -i "s/ndkVersion \".*\"/ndkVersion \"$NDK_VER\"/" android/app/build.gradle || true
            echo "ANDROID_NDK_HOME=$ANDROID_SDK_ROOT/ndk/$NDK_VER" >> $GITHUB_ENV
          fi

      - name: Show generated Gradle files (debug)
        run: |
          echo "=== settings.gradle ==="
          cat android/settings.gradle 2>/dev/null || cat android/settings.gradle.kts 2>/dev/null || echo "not found"
          echo ""
          echo "=== build.gradle (top-level) ==="
          cat android/build.gradle 2>/dev/null || cat android/build.gradle.kts 2>/dev/null || echo "not found"

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('android/**/*.gradle*', 'android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Build debug APK
        working-directory: android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon --stacktrace
        env:
          ANDROID_HOME: ${{ env.ANDROID_SDK_ROOT }}
          ANDROID_NDK_HOME: ${{ env.ANDROID_NDK_HOME }}
          JAVA_HOME: ${{ env.JAVA_HOME }}
          GRADLE_OPTS: -Dorg.gradle.jvmargs="-Xmx4g -XX:MaxMetaspaceSize=512m"

      - name: Locate & upload APK
        run: |
          APK=$(find android -name "*.apk" | head -1)
          echo "APK: $APK"
          mkdir -p output
          cp "$APK" output/zigzag-fibo.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ZIGZAG_FIBO-APK
          path: output/zigzag-fibo.apk
          if-no-files-found: error
          retention-days: 30

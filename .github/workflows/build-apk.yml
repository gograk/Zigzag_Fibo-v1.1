name: Build ZIGZAG_FIBO APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-apk:
    name: Build Android APK (Gradle — tanpa expo.dev)
    runs-on: ubuntu-latest

    steps:
      # ── Checkout ─────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── Java (dibutuhkan Gradle / Android SDK) ────────────────────────
      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      # ── Node.js ───────────────────────────────────────────────────────
      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # ── Cache node_modules ────────────────────────────────────────────
      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-npm-${{ hashFiles('package-lock.json') }}
          restore-keys: ${{ runner.os }}-npm-

      # ── Install dependencies ──────────────────────────────────────────
      - name: Install dependencies
        run: npm install

      # ── Generate native Android project ───────────────────────────────
      # expo prebuild membuat folder android/ dengan file Gradle
      # TIDAK perlu akun expo.dev atau token EAS sama sekali
      - name: Generate Android project (expo prebuild)
        run: npx expo prebuild --platform android --no-install --clean
        env:
          EXPO_NO_TELEMETRY: 1

      # ── Cache Gradle ──────────────────────────────────────────────────
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('android/**/*.gradle*', 'android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle-

      # ── Build APK dengan Gradle ────────────────────────────────────────
      - name: Build debug APK
        working-directory: android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon
        env:
          ANDROID_HOME: ${{ env.ANDROID_SDK_ROOT }}
          GRADLE_OPTS: -Dorg.gradle.jvmargs="-Xmx4g -XX:MaxMetaspaceSize=512m"

      # ── Rename & Upload APK ────────────────────────────────────────────
      - name: Rename APK
        run: |
          mkdir -p output
          cp android/app/build/outputs/apk/debug/app-debug.apk \
             output/zigzag-fibo-$(date +%Y%m%d-%H%M).apk
          ls -lh output/

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ZIGZAG_FIBO-APK
          path: output/*.apk
          retention-days: 30
